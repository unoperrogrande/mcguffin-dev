name: Deploy to mcguffin.dev
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_SF_CLIENT_ID: ${{ secrets.VITE_SF_CLIENT_ID }}
          VITE_SF_LOGIN_URL: ${{ secrets.VITE_SF_LOGIN_URL }}

      - name: Package build
        run: tar -czf deploy.tar.gz -C dist .

      - name: Upload to cPanel
        run: |
          RESPONSE=$(curl -sk -X POST "https://${{ secrets.SSH_HOST }}:2083/execute/Fileman/upload_files" \
            -H "Authorization: cpanel ${{ secrets.SSH_USER }}:${{ secrets.CPANEL_TOKEN }}" \
            -F "dir=/home/${{ secrets.SSH_USER }}/public_html/mcguffin.dev" \
            -F "file-1=@deploy.tar.gz" \
            -F "overwrite=1")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"status":1' || (echo "Upload failed" && exit 1)

      - name: Extract on server
        run: |
          RESPONSE=$(curl -sk -X POST "https://${{ secrets.SSH_HOST }}:2083/execute/Fileman/extract_an_archive" \
            -H "Authorization: cpanel ${{ secrets.SSH_USER }}:${{ secrets.CPANEL_TOKEN }}" \
            -d "dir=/home/${{ secrets.SSH_USER }}/public_html/mcguffin.dev" \
            -d "file=deploy.tar.gz" \
            -d "tool=tar")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"status":1' || (echo "Extract failed" && exit 1)